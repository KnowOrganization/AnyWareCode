Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 64

# Docker networks only; never expose this port publicly.
Allow 172.16.0.0/12
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# CONNECT is only allowed to TLS.
ConnectPort 443

# Deny everything not matching the allowlist in /etc/tinyproxy/filter.
FilterDefaultDeny Yes
FilterURLs Off
Filter "/etc/tinyproxy/filter"
