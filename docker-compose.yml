services:
  # Only way out of the runner network. Runners get HTTPS_PROXY pointed here;
  # the filter file allowlists Anthropic + GitHub and nothing else.
  egress-proxy:
    image: ${REGISTRY:-ghcr.io/knoworganization}/anywarecode-egress-proxy:latest
    build: infra/egress-proxy
    networks:
      - default
      - runner-egress

  # Holds the runner image. CI builds+pushes it; the box `compose pull`s it so
  # the tag is present locally for the bot to launch task containers from.
  runner-image:
    image: ${REGISTRY:-ghcr.io/knoworganization}/anywarecode-runner:latest
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    entrypoint: ["true"]

  bot:
    image: ${REGISTRY:-ghcr.io/knoworganization}/anywarecode-bot:latest
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      RUNNER_NETWORK: anywarecode-egress
      RUNNER_HTTPS_PROXY: http://egress-proxy:8888
      # Must match the runner-image tag above so the bot finds the pulled image.
      RUNNER_IMAGE: ${REGISTRY:-ghcr.io/knoworganization}/anywarecode-runner:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    depends_on:
      runner-image:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  # Task containers join only this network (internal: no direct internet).
  runner-egress:
    name: anywarecode-egress
    internal: true
