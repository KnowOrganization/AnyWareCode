services:
  # Only way out of the runner network. Runners get HTTPS_PROXY pointed here;
  # the filter file allowlists Anthropic + GitHub and nothing else.
  egress-proxy:
    build: infra/egress-proxy
    networks:
      - default
      - runner-egress

  # One-shot service: builds the runner image so `docker compose up -d --build`
  # ships both bot and runner atomically from the same checkout.
  runner-image:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    image: anywarecode-runner
    entrypoint: ["true"]

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file: .env
    environment:
      RUNNER_NETWORK: anywarecode-egress
      RUNNER_HTTPS_PROXY: http://egress-proxy:8888
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    depends_on:
      runner-image:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  # Task containers join only this network (internal: no direct internet).
  runner-egress:
    name: anywarecode-egress
    internal: true
