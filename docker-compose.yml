services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: anywherecode
      POSTGRES_PASSWORD: anywherecode
      POSTGRES_DB: anywherecode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Only way out of the runner network. Runners get HTTPS_PROXY pointed here;
  # the filter file allowlists Anthropic + GitHub and nothing else.
  egress-proxy:
    build: infra/egress-proxy
    networks:
      - default
      - runner-egress

volumes:
  pgdata:

networks:
  # Task containers join only this network (internal: no direct internet).
  runner-egress:
    name: anywherecode-egress
    internal: true
